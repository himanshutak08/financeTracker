name: CSV/XLSX import issue
description: Report a bulk import problem
title: "[Import]: "
labels: ["import", "bug"]
body:
  - type: input
    id: version
    attributes:
      label: Finance Tracker version
      placeholder: "0.2.11"
    validations:
      required: true
  - type: dropdown
    id: file_type
    attributes:
      label: File type
      options:
        - CSV
        - XLSX
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Import error shown in the UI
      render: text
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal sample rows
      description: Paste only non-sensitive sample rows that reproduce the issue.
      render: csv
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I tried the downloadable sample CSV.
        - label: My file is 5 MB or smaller.
        - label: I removed or anonymized sensitive finance data.
